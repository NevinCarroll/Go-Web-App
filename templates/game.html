<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Defender - Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2f4f4f;
            color: white;
            margin: 0;
            padding: 0;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
            background-color: #2f4f4f;
        }
        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 16px;
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 16px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: #1f1f1f;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            min-width: 320px;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-actions button {
            padding: 10px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            min-width: 120px;
            font-size: 14px;
        }

        .modal-actions button:hover {
            opacity: 0.9;
        }

        #quitSaveBtn { background: #2e8b57; color: white; }
        #quitNoSaveBtn { background: #b22222; color: white; }
        #quitCancelBtn { background: #555; color: white; }
    </style>
</head>
<body data-user="{{ .User }}">
    <canvas id="gameCanvas" width="1024" height="768"></canvas>
    <div id="stats"></div>
    <div id="controls">
        <button id="btnStandard">Standard Tower (1)</button>
        <button id="btnRapid">Rapid Tower (2)</button>
        <button id="btnSniper">Sniper Tower (3)</button>
        <button id="btnNextWave">Spawn Next Wave</button>
        <div id="waveInfo" style="margin-top:6px; font-size:15px;"></div><br>
        Press 1: Standard Tower<br>
        Press 2: Rapid Tower<br>
        Press 3: Sniper Tower<br>
        Left Click: Place Tower<br>
        Right Click: Cancel Placement<br>
        Esc: Quit Game
    </div>

    <div id="quitModal" class="modal hidden">
        <div class="modal-content">
            <h2>Quit Game</h2>
            <p>Do you want to save before exiting?</p>
            <div class="modal-actions">
                <button id="quitSaveBtn">Save and Exit</button>
                <button id="quitNoSaveBtn">Exit without Saving (Game Over)</button>
                <button id="quitCancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/static/game.js"></script>
</body>
</html>
