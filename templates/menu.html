<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Defender - Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2f4f4f;
            color: white;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 3em;
        }
        button {
            font-size: 1.5em;
            padding: 10px 20px;
            margin: 10px;
            background-color: #4682b4;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #5a9bd4;
        }
    </style>
</head>
<body>
    <h1>Castle Defender</h1>
    {{ if .User }}
        <p>Logged in as <strong>{{ .User }}</strong>. <a href="/logout">Logout</a></p>
        <button onclick="window.location.href='/game'">Start Game</button>
    {{ else }}
        <button onclick="window.location.href='/login'">Login</button>
        <button onclick="window.location.href='/register'">Register</button>
    {{ end }}
    <button onclick="window.location.href='/quit'">Quit</button>
</body>
</html>
