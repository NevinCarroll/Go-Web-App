<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Defender - Tutorial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2f4f4f;
            color: white;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2em;
        }
        p {
            font-size: 1.2em;
            line-height: 1.5;
        }
        button {
            font-size: 1.5em;
            padding: 10px 20px;
            margin: 10px;
            background-color: #4682b4;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #5a9bd4;
        }
    </style>
</head>
<body>
    <h1>TUTORIAL</h1>
    <p>
        Press 1-3 to choose tower type<br>
        Then left click to place selected tower<br>
        Or right click to cancel tower placement<br>
        A tower preview will show you tower range and if you are allowed to place it<br>
        Survive as many waves of enemies as you can<br>
        or press quit to end game early
    </p>
    <button onclick="window.location.href='/'">Back</button>
</body>
</html>
