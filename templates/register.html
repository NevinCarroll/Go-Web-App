<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Defender - Register</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2f4f4f; color: white; text-align: center; padding: 60px; }
        input, button { font-size: 1em; padding: 10px; margin: 6px; }
        .error { color: #ffdddd; margin: 12px; }
        .box { display: inline-block; background: #3c5a75; border-radius: 8px; padding: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Register</h1>
        {{ if .Error }}<div class="error">{{ .Error }}</div>{{ end }}
        <form method="POST" action="/register">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Register</button>
        </form>
        <p><a href="/login">Login</a> | <a href="/">Back to menu</a></p>
    </div>
</body>
</html>
